<h1 class="titulo">Portugal</h1>

<div class="produtos-grid" id="produtos"></div>

<script>

const camisas = [

{
nome: "Portugal Home 2026",
imagem: "img/selecoes/portugal/portugal_home_2026_1.png",
link: "portugal-home-2026.html"
},

{
nome: "Portugal Away 2026",
imagem: "img/selecoes/portugal/portugal_home_2026_2.png",
link: "portugal-away-2026.html"
}

];

const container = document.getElementById("produtos");

camisas.forEach(camisa => {

container.innerHTML += `
<a href="${camisa.link}">
<div class="card-camisa">

<img src="${camisa.imagem}">

<p>${camisa.nome}</p>

</div>
</a>
`;

});

</script>
